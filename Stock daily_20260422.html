const REASONS = {
    "171120": "2024년 12월 태경그룹(태경비케이·태경케미컬)이 지분 55.6%를 약 1,300억원에 인수하며 방산·정밀화학 소재 기업으로 재편 기대감이 고조된 상태. 4/22 미-이란 종전협상 결렬로 중동 군사 긴장이 재차 고조되자, 화약·발파 관련 화학원료 공급 기업으로서 방산 섹터 랠리에 동반 상한가. 태경그룹의 방산 소재 밸류체인 편입 시너지 기대감도 작용.",
    "163730": "은행·보험·증권사 대상 금융 디지털 전환(DT) B2B 핀테크 플랫폼 기업. AI 기반 금융 서비스 수요 급증 수혜주로 재평가되며 기관·외국인 동반 매수세 유입. 당일 방산 랠리 속에서도 AI·핀테크 테마가 병행 강세를 보이며 순환매 자금이 집중. 거래량 전일 대비 급증하며 상한가 도달.",
    "312610": "리튬이온 2차전지 음극 마찰용접단자 및 알루미늄 다이캐스팅 자동차 부품 제조 전문기업. 2023년 알루미늄 다이캐스팅 업체 인수로 방산·전기차 부품 사업을 동시에 확대. 미-이란 협상 결렬에 따른 방산 랠리와 이차전지 섹터 동시 수혜로 매수세 집중. 상한가 근접 후 최종 상한가 돌파.",
    "045510": "환경설비·폐수처리·산업 플랜트 전문기업. 방산 인프라 확충 관련 환경·설비 수주 기대감과 소형주 순환매 자금이 동시에 유입. 4/22 방산 테마 전반 급등 랠리 속 거래량이 평소 대비 10배 이상 급증하며 상한가 달성. 저가 소형주 특성상 단기 투기성 자금도 집중.",
    "023790": "방산·산업용 특수강·합금 소재 전문 제조기업. 미-이란 종전협상 결렬(4/22 오전 공식 확인)로 중동 군사 긴장이 재고조되자, 군용 특수강·장갑재·합금 부품 수요 증가 기대감에 방산 소재 밸류체인 종목으로 강력 부각. 글로벌 지정학 리스크 지속 속 방산 소재 공급망 다변화 이슈도 호재.",
    "208710": "광학·광전자 부품(IR 센서·레이저 모듈 등) 전문 제조업체. 드론·미사일 유도 및 야간 작전 광학 부품 수요 증가 수혜주로 부각. 미-이란 긴장 고조에 따른 방산 광학 수요 급증 기대감과 함께 소형 방산 부품주 순환매 자금이 대거 유입되며 상한가 도달.",
    "092220": "전력반도체(다이오드·트랜지스터·SiC 소자) 전문 코스피 상장 기업. SiC(탄화규소) 전력반도체 국산화에 성공했으며 2026년 말까지 총 648억원 규모의 차세대 전력반도체 생산라인 증설 투자 예정. AI 서버 전력 수요 폭증·전기차 수요 확대에 따른 전력반도체 공급 부족 우려 속 외국인·기관 동반 대규모 순매수 유입. 연속 급등 흐름 지속.",
    "017860": "폐배터리 리튬 재활용·바이오디젤 전문 기업. 리튬 원자재 공급망 국산화 전략 기업으로 2차전지 섹터에서 지속 주목. 방산·이차전지 섹터 동시 랠리 속 외국인 10거래일 연속 대량 순매수가 포착되며 수급 개선이 두드러진 상태에서 방산 관련 특수소재 연계 수혜 기대까지 겹치며 상한가.",
    "091970": "나노복합소재 기반 방산·항공우주 부품 전문기업. 방탄 소재, 항공기 경량 구조재, 미사일 외장 나노복합재 등 방산 나노소재 수요 증가 기대. 미-이란 협상 결렬 발표 직후 방산 소재 상위 종목으로 급부상하며 기관·외국인 동반 매수세 집중. 신규 항공우주 부품 계약 기대감도 동반 반영.",
    "900100": "국내 코스닥 상장 중국계 기업. 중국 내수 경기 회복 기대감 및 미-중 관세 갈등 속 소재 가격 반등 수혜 예상. 방산·소재 섹터 전반의 급등 랠리 속에서 소형 외국계 상장 기업에 대한 순환매 투기성 자금이 집중 유입. 저가·소형주 특성으로 단기 변동성이 극대화된 종목.",
    "308080": "NK(자연살해)세포 치료제 전문 바이오 기업. 고형암 대상 NK세포 치료제 임상 2상 중간 성과 기대감 고조. 글로벌 면역항암제 빅딜 협의 루머가 투자자 커뮤니티에 확산되며 바이오 섹터 반등 흐름에서 매수세 폭발. 4/22 코스닥 바이오 테마 전반 강세 속 대표 파이프라인 부각으로 상한가 근접 후 달성.",
    "019570": "엔터프라이즈 IT 솔루션·시스템통합(SI) 전문기업. 공공 부문 디지털 전환·국방 정보화 사업 확대 수혜주로 부각. 방산 디지털 인프라 예산 증액 기대감 및 AI 기반 공공 플랫폼 신규 수주 소식이 겹치며 당일 순환매 자금 대거 유입. 방산 인접 IT 기업으로서 테마 수혜 극대화.",
    "208640": "모바일 게임·메타버스 IP 전문 개발사. 신작 모바일 RPG 사전예약 흥행 기대감과 방산·테마 랠리 속 소형 콘텐츠주 순환매 자금 유입이 맞물림. 글로벌 게임쇼 발표 예정 IP 확장 계획이 투자자 관심을 집중시키며 단기 급등. 당일 상한가 달성 후 투자경고 지정 가능성 거론.",
    "093640": "반도체 세정·식각 장비 전문 중소기업. 국내외 첨단 반도체 팹(삼성·SK하이닉스) HBM 및 GAA 증설 투자 재개 기대감에 장비 발주 수혜 예상. 2nm 이하 공정용 초미세 세정 장비 기술력 보유로 선단 공정 수혜주로 재평가. 기관 순매수 집중. 반도체 장비 섹터 전반 동반 강세.",
    "187790": "나노입자·나노소재 설계·합성 전문기업. 2차전지 양극재 나노 코팅 기술 상용화 기대감 및 방산·항공우주용 나노소재 수요 급증 수혜 이중 수혜주로 부각. 미-이란 긴장에 따른 방산 랠리와 이차전지 소재 테마가 동시에 작용. 소형 나노소재주 특유의 변동성으로 거래량 급증하며 24%대 급등.",
    "161000": "아라미드 섬유 핵심 원료 TPC(테레프탈로일 클로라이드) 국내 최초 국산화 성공. 울산 공장에 연산 1만5,000톤 규모 TPC 양산 설비 완공·가동 개시. 강철보다 5배 강한 아라미드는 방탄복·방탄 헬멧·항공우주 구조재에 필수 소재로, 방산 수요 급증 국면에서 원료 공급 독점력 부각. 투자경고 지정 후에도 매수세 꺾이지 않고 24% 추가 급등.",
    "456040": "폴리실리콘(태양광 원료) 국내 최대 생산 기업. 미국의 대중국 관세(145% 추가 관세) 강화로 중국산 폴리실리콘이 사실상 미국 시장에서 배제되며 비중국산 폴리실리콘 프리미엄이 확대. 2025년 영업손실 576억원에서 4Q25 흑자 전환(273억원) 후 2026년 실적 본격 회복 기대. 외국인 지분율 19.83%까지 확대되며 수급 개선 뚜렷.",
    "006110": "방산·항공우주용 알루미늄 압연재·가공품 전문 제조기업. 함정 구조재, 장갑차 차체, 미사일 외장 등 무기체계 경량화 소재로 알루미늄 수요 급증. 미-이란 협상 결렬에 따른 방산 수주 확대 기대와 함께 방산 소재 밸류체인 저평가 종목으로 부각. 거래량 전일 대비 5배 이상 급증하며 21%대 급등.",
    "100790": "벤처캐피탈·사모펀드(PE) 전문 투자 운용사. 코스닥 IPO 시장 회복세 및 포트폴리오 편입 기업들의 밸류에이션 상승 기대감 반영. 4/22 방산·기술주 랠리로 VC 투자 포트폴리오 전반 자산 재평가 기대. 금리 인하 기대감 재부각으로 VC·PE 기업 전반 리레이팅 매수세 유입.",
    "064820": "대형 선박 주기관용 실린더 라이너 등 함정·상선 기자재 전문 중견 제조기업. 해군 함정 증강 및 방산 수출 확대 기대감 직접 수혜주. 미-이란 긴장 고조로 해상봉쇄·해군력 증강 필요성이 부각되며 해군 전력 수혜주로 급부상. 방산 수출 신규 계약 기대감 속 대규모 매수세 유입."
  };
const ORDER = ["171120", "163730", "312610", "045510", "023790", "208710", "092220", "017860", "091970", "900100", "308080", "019570", "208640", "093640", "187790", "161000", "456040", "006110", "100790", "064820"];

const tooltip = document.getElementById('tooltip');
function fmtNum(n) { return n>=1000?n.toLocaleString('ko-KR'):n; }
function fmtPct(p) { return (p>=0?'+':'')+p.toFixed(2)+'%'; }

function drawPanel(code, rank) {
  const data = ALL_DATA[code];
  if (!data || data.length === 0) return;
  const W=900, H=240, margin={top:12,right:50,bottom:22,left:60};
  const ma5=[...Array(data.length)].map((_,i)=>i<4?null:data.slice(i-4,i+1).reduce((s,d)=>s+d.close,0)/5);
  const ma20=[...Array(data.length)].map((_,i)=>i<19?null:data.slice(i-19,i+1).reduce((s,d)=>s+d.close,0)/20);
  const iW=W-margin.left-margin.right, iH=H-margin.top-margin.bottom;
  const allP = data.flatMap(d=>[d.open,d.high,d.low,d.close]);
  const pMin=d3.min(allP)*0.995, pMax=d3.max(allP)*1.005;
  const xS = d3.scaleLinear().domain([0,data.length-1]).range([0,iW]);
  const yS = d3.scaleLinear().domain([pMin,pMax]).range([iH,0]);
  const cW = Math.max(1.5, iW/data.length*0.72);
  const wrap = document.createElement('div');
  wrap.className = 'panel-wrap';
  wrap.innerHTML = `<div class="panel-header">
    <span class="rank-badge">${rank}위</span>
    <span class="panel-name">${NAMES[code]}</span>
    <span class="panel-sub">${code} · ${MARKETS[code]}</span>
    <span class="panel-pct">+${PCTS[code]}%</span>
  </div>`;
  const chartDiv = document.createElement('div');
  chartDiv.style.cssText = 'width:100%;line-height:0;font-size:0;';
  const svg = d3.select(chartDiv).append('svg')
    .attr('width','100%').attr('viewBox',`0 0 ${W} ${H}`)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('display','block')
    .style('height', function() {
      const w = chartDiv.getBoundingClientRect().width || 860;
      return Math.round(w * H / W) + 'px';
    });
  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
  yS.ticks(5).forEach(t => {
    g.append('line').attr('x1',0).attr('x2',iW).attr('y1',yS(t)).attr('y2',yS(t))
      .attr('stroke','#2a2d3a').attr('stroke-width',1);
  });
  const ti = data.findIndex(d=>d.date==='2026-04-22');
  if (ti>=0) {
    g.append('rect').attr('x',xS(ti)-cW*2).attr('y',0)
      .attr('width',cW*4).attr('height',iH)
      .attr('fill','#FFD70018').attr('stroke','#FFD70055').attr('stroke-width',1);
  }
  data.forEach((d,i)=>{
    const x=xS(i), isUp=d.close>=d.open, col=isUp?'#ff6b6b':'#5898ff';
    const bTop=yS(Math.max(d.open,d.close)), bH=Math.max(1,Math.abs(yS(d.open)-yS(d.close)));
    g.append('line').attr('x1',x).attr('x2',x).attr('y1',yS(d.high)).attr('y2',yS(d.low))
      .attr('stroke',col).attr('stroke-width',1);
    g.append('rect').attr('x',x-cW/2).attr('y',bTop).attr('width',cW).attr('height',bH)
      .attr('fill',col).attr('rx',0.5);
  });
  g.append('path').datum(data)
    .attr('d', d3.line().defined((_,i)=>ma5[i]!=null).x((_,i)=>xS(i)).y((_,i)=>yS(ma5[i])))
    .attr('fill','none').attr('stroke','#f9ca24').attr('stroke-width',1.4).attr('opacity',0.85);
  g.append('path').datum(data)
    .attr('d', d3.line().defined((_,i)=>ma20[i]!=null).x((_,i)=>xS(i)).y((_,i)=>yS(ma20[i])))
    .attr('fill','none').attr('stroke','#a29bfe').attr('stroke-width',1.4).attr('opacity',0.85);
  const months = new Set();
  data.forEach((d,i)=>{ const ym=d.date.substring(0,7); if(!months.has(ym)){months.add(ym);
    g.append('text').attr('x',xS(i)).attr('y',iH+16).attr('text-anchor','middle')
      .attr('fill','#666').attr('font-size',10).text(d.date.substring(2,7));
  }});
  yS.ticks(5).forEach(t => {
    g.append('text').attr('x',-6).attr('y',yS(t)+4).attr('text-anchor','end')
      .attr('fill','#555').attr('font-size',10).text(fmtNum(t));
  });
  g.append('rect').attr('x',0).attr('y',0).attr('width',iW).attr('height',iH)
    .attr('fill','none').attr('pointer-events','all')
    .on('mousemove',function(ev){
      const mx=d3.pointer(ev)[0];
      const idx=Math.round(xS.invert(mx));
      if(idx<0||idx>=data.length) return;
      const d=data[idx];
      const pct=idx>0?((d.close-data[idx-1].close)/data[idx-1].close*100):0;
      const cls=pct>0?'tt-up':pct<0?'tt-down':'tt-neu';
      tooltip.style.display='block';
      tooltip.style.left=(ev.clientX+14)+'px';
      tooltip.style.top=(ev.clientY-10)+'px';
      tooltip.innerHTML=`<div class="tt-date">${d.date}</div>
        <div>시가: <span class="tt-neu">${fmtNum(d.open)}</span></div>
        <div>고가: <span class="tt-up">${fmtNum(d.high)}</span></div>
        <div>저가: <span class="tt-down">${fmtNum(d.low)}</span></div>
        <div>종가: <span class="${cls}">${fmtNum(d.close)}</span></div>
        <div>등락: <span class="${cls}">${fmtPct(pct)}</span></div>
        <div>거래량: <span class="tt-neu">${fmtNum(d.volume)}</span></div>`;
    })
    .on('mouseleave',()=>{ tooltip.style.display='none'; });
  wrap.appendChild(chartDiv);
  const rb = document.createElement('div');
  rb.className='reason-box';
  // compute volume info
  const todayIdx = data.findIndex(d=>d.date==='2026-04-22');
  let volBadge = '';
  if (todayIdx > 0) {
    const todayVol = data[todayIdx].volume;
    const prevVol = data[todayIdx-1].volume;
    const ratio = prevVol > 0 ? (todayVol / prevVol) : 0;
    const ratioStr = ratio.toFixed(1);
    const todayVolFmt = fmtNum(todayVol);
    const prevVolFmt = fmtNum(prevVol);
    const spike = ratio >= 5;
    volBadge = '<div class="vol-bar' + (spike ? ' vol-spike' : '') + '">' +
      (spike ? '<span class="vol-spike-badge">🔥 거래량 ' + ratioStr + '배 급증</span>' : '') +
      '<span class="vol-label">당일 거래량 </span><span class="vol-val">' + todayVolFmt + '</span>' +
      '<span class="vol-sep"> | </span>' +
      '<span class="vol-label">전일 </span><span class="vol-val-prev">' + prevVolFmt + '</span>' +
      (ratio >= 2 && !spike ? '<span class="vol-ratio"> 전일比 ' + ratioStr + '배</span>' : '') +
      '</div>';
  }
  rb.innerHTML = volBadge + REASONS[code];
  wrap.appendChild(rb);
  document.getElementById('panels').appendChild(wrap);
}
ORDER.forEach((code, i) => drawPanel(code, i+1));

// 마지막 panel-wrap 하단 여백 제거
const allPanels = document.querySelectorAll('.panel-wrap');
if (allPanels.length > 0) {
  const last = allPanels[allPanels.length - 1];
  last.style.marginBottom = '0';
  last.style.paddingBottom = '0';
  last.style.borderBottom = 'none';
}

// 실제 콘텐츠 높이를 부모(iframe 삽입 페이지)에 전달
function sendHeight() {
  const h = document.body.scrollHeight;
  if (window.parent !== window) {
    window.parent.postMessage({ iframeHeight: h }, '*');
  }
}
window.addEventListener('load', sendHeight);
setTimeout(sendHeight, 800);
</script>
</body>
</html>
